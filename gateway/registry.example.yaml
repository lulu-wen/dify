# CUSTOMER_REGISTRY for AI SDK Gateway
#
# Each entry maps an SDK key to a Dify deployment + the set of models the
# customer is permitted to invoke. Models are lazy-built into Dify Apps on
# first use and cached.

customers:
  - sdk_key: "bsa_dev_example_abc123"
    customer_id: "customer-a"
    dify:
      base_url: "http://dify-customer-a:5001"
      console_email: "admin@customer-a.example"
      console_password: "REPLACE_WITH_REAL_PASSWORD"
      # Existing Dataset API key created out-of-band (used by lazy app builder
      # to attach knowledge bases when building Apps).
      dataset_api_key: "dataset-customer-a-replace-me"
    models:
      - id: "qwen3.6-35b"
        # Dify provider/model used inside the auto-built App's model_config.
        # Matches the names registered in Dify's model provider plugin.
        provider: "langgenius/openai_api_compatible/openai_api_compatible"
        name: "qwen3.6-35b"
        # ``owner`` = publisher identity for /v1/models response (OpenAI
        # ``owned_by`` semantics). Use the upstream publisher's name, e.g.
        #   gpt-*     -> "openai"
        #   Llama-*   -> "meta-llama"
        #   Qwen*     -> "Qwen"
        #   bge-*     -> "BAAI"
        # Omit to default to "ai-sdk-gateway".
        owner: "Qwen"
        completion_params:
          temperature: 0.3
          max_tokens: 2048
      - id: "qwen3.6-35b-creative"
        provider: "langgenius/openai_api_compatible/openai_api_compatible"
        name: "qwen3.6-35b"
        owner: "Qwen"
        completion_params:
          temperature: 0.9
          max_tokens: 4096
    # Embedding models — proxied straight to an OpenAI-compatible endpoint
    # (typically vLLM in ``--task embed`` mode). No Dify involvement, no
    # lazy-build: vectorisation is stateless and Dify only matters for
    # orchestration + RAG.
    embedding_models:
      - id: "bge-m3"
        name: "bge-m3"
        owner: "BAAI"
        endpoint_url: "http://vllm-embed:8000/v1"
        api_key: "EMPTY"          # vLLM doesn't validate; use a real key for other providers
        dimensions: 1024
    # Optional: knowledge bases (Dataset IDs) to attach to every auto-built App.
    knowledge_bases: []

  - sdk_key: "bsa_dev_example_def456"
    customer_id: "customer-b"
    dify:
      base_url: "http://dify-customer-b:5001"
      console_email: "admin@customer-b.example"
      console_password: "REPLACE_WITH_REAL_PASSWORD"
      dataset_api_key: "dataset-customer-b-replace-me"
    models:
      - id: "qwen3.6-35b"
        provider: "langgenius/openai_api_compatible/openai_api_compatible"
        name: "qwen3.6-35b"
        owner: "Qwen"
        completion_params:
          temperature: 0.5
          max_tokens: 2048
    embedding_models:
      - id: "bge-m3"
        name: "bge-m3"
        owner: "BAAI"
        endpoint_url: "http://vllm-embed:8000/v1"
        api_key: "EMPTY"
        dimensions: 1024
    knowledge_bases:
      - "kb-uuid-customer-b-alarms"
